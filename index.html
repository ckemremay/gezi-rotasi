<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1C3A2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gezi Rotası">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/travel-ready.png">
<title>Gezi Rotası</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
/* ════ 2026 DESIGN TOKENS ════ */
:root{
  --ink:#1A1A1A;--ink-2:#5C5650;--ink-3:#9C948B;
  --canvas:#F6F8FE;--surface:#FFFFFF;--surface-2:#EEF2FB;
  --pri:#2563EB;--pri2:#4F46E5;
  --acc:#4F46E5;--acc-soft:#EEF2FF;
  --green:#3E8A60;--red:#E4543F;--amber:#E2A93B;
  --bg:var(--canvas);--text:var(--ink);--muted:var(--ink-3);--border:rgba(26,26,26,.08);
  --e1:0 1px 2px rgba(26,26,26,.04),0 2px 8px rgba(26,26,26,.04);
  --e2:0 2px 4px rgba(26,26,26,.04),0 8px 24px rgba(26,26,26,.08);
  --e3:0 4px 8px rgba(26,26,26,.06),0 16px 40px rgba(26,26,26,.14);
  --sh:var(--e1);--sh-lg:var(--e3);
  --r-lg:20px;--r-md:14px;--r-full:999px;
  --fast:160ms;--base:200ms;
  --ease:cubic-bezier(.2,.8,.3,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);
          overscroll-behavior:none;line-height:1.5;-webkit-font-smoothing:antialiased;}
input,select,textarea{font-family:'Inter',sans-serif;outline:none;font-size:15px;
  border:1.5px solid var(--border);transition:border-color var(--base) var(--ease),box-shadow var(--base) var(--ease);
  color:var(--text);background:#fff;border-radius:14px;padding:12px 14px;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.10);}
::-webkit-scrollbar{display:none;}
button{font-family:'Inter',sans-serif;}
.tap{cursor:pointer;user-select:none;transition:transform var(--fast) var(--ease),opacity var(--fast),box-shadow var(--base) var(--ease),background var(--base) var(--ease);}
.tap:active{transform:scale(.96);opacity:.88;}
.overlay{position:fixed;inset:0;background:rgba(26,26,26,.45);
  backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:480px){.overlay{align-items:center;padding:20px;}}
.modal{background:#fff;border-radius:28px 28px 0 0;padding:26px 22px calc(26px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:var(--e3);
  animation:slideUp .25s var(--ease);}
@media(min-width:480px){.modal{border-radius:28px;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.btn-pri{background:linear-gradient(90deg,#3B82F6,#4F46E5);color:#fff;border:none;padding:15px;
  border-radius:16px;font-weight:700;font-size:15px;width:100%;cursor:pointer;
  transition:filter var(--base) var(--ease),transform var(--fast) var(--ease),box-shadow var(--base) var(--ease);
  box-shadow:0 6px 18px rgba(59,130,246,.30);}
.btn-pri:hover{filter:brightness(.94);box-shadow:0 10px 26px rgba(59,130,246,.40);}
.btn-pri:active{transform:scale(.95);}
.btn-out{background:#fff;border:1.5px solid var(--border);padding:13px;
  border-radius:16px;font-weight:600;font-size:14px;width:100%;color:var(--pri);cursor:pointer;
  transition:background var(--base) var(--ease),transform var(--fast) var(--ease);}
.btn-out:hover{background:var(--surface-2);}
.btn-out:active{transform:scale(.97);}
.lbl{font-size:11px;font-weight:800;color:var(--ink-3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
/* Hero header */
.header{background:linear-gradient(165deg,#2563EB 0%,#4F46E5 80%,#6366F1 100%);color:#fff;
  padding:calc(40px + env(safe-area-inset-top)) 22px 20px;
  border-bottom-left-radius:32px;border-bottom-right-radius:32px;
  box-shadow:0 10px 28px rgba(37,99,235,.22);position:relative;overflow:hidden;}
.header::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;
  border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.10),transparent 70%);pointer-events:none;}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2;}
.eyebrow{font-size:12px;font-weight:600;opacity:.75;}
.header h1{font-family:'Libre Baskerville',serif;font-size:28px;line-height:1.15;letter-spacing:-.01em;margin:3px 0 0;}
.meta{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;opacity:.85;margin-top:10px;flex-wrap:wrap;}
.sync-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);
  backdrop-filter:blur(8px);padding:5px 11px;border-radius:var(--r-full);font-size:10px;font-weight:700;letter-spacing:.04em;}
.dot{width:6px;height:6px;border-radius:50%;}
.avatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);
  border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;cursor:pointer;flex-shrink:0;transition:transform var(--fast) var(--ease);}
.avatar:active{transform:scale(.9);}
.hbtn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);
  padding:7px 12px;border-radius:var(--r-full);font-size:11px;font-weight:700;cursor:pointer;
  transition:background var(--base) var(--ease);}
.hbtn:hover{background:rgba(255,255,255,.24);}
.glass{margin-top:16px;background:rgba(255,255,255,.13);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:13px 16px;position:relative;z-index:2;}
.glass .row{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;}
.track{height:7px;border-radius:4px;background:rgba(255,255,255,.22);margin-top:8px;overflow:hidden;}
.fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#E2A93B,#F4C861);transition:width .6s var(--ease);}
/* Sehir chipleri */
.tabs{display:flex;background:var(--bg);overflow-x:auto;padding:14px 18px 4px;gap:8px;
  position:sticky;top:env(safe-area-inset-top,0px);z-index:100;white-space:nowrap;}
.ctab{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--r-full);
  background:var(--surface);border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--ink-2);
  cursor:pointer;transition:all var(--base) var(--ease);box-shadow:var(--e1);}
.ctab:hover{transform:translateY(-1px);box-shadow:var(--e2);}
.ctab:active{transform:scale(.95);}
.ctab.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700;}
.seg{display:flex;background:var(--surface-2);border-radius:16px;padding:4px;margin:14px 18px 4px;gap:4px;}
.seg-item{flex:1;text-align:center;padding:10px 4px;border-radius:12px;font-size:12.5px;
  font-weight:700;color:var(--ink-3);cursor:pointer;transition:all var(--base) var(--ease);}
.seg-item.on{background:#fff;color:var(--pri);box-shadow:var(--e1);}
/* Kartlar: hover scale + staggered fade-in */
.card{background:#fff;border-radius:var(--r-lg);padding:18px;margin-bottom:14px;
  box-shadow:var(--e1);border:1px solid var(--border);
  transition:transform var(--base) var(--ease),box-shadow var(--base) var(--ease);
  animation:fadeUp .45s var(--ease) both;}
.card:hover{box-shadow:var(--e2);}
.place-card{background:#fff;border-radius:var(--r-lg);padding:16px 16px 13px;
  margin-bottom:13px;box-shadow:var(--e1);border:1px solid var(--border);
  transition:transform var(--base) var(--ease),box-shadow var(--base) var(--ease);
  animation:fadeUp .45s var(--ease) both;}
.place-card:hover{transform:scale(1.03);box-shadow:var(--e3);}
.place-card:active{transform:scale(.95);}
.place-card:nth-child(1){animation-delay:.04s}.place-card:nth-child(2){animation-delay:.1s}
.place-card:nth-child(3){animation-delay:.16s}.place-card:nth-child(4){animation-delay:.22s}
.place-card:nth-child(5){animation-delay:.28s}.place-card:nth-child(n+6){animation-delay:.34s}
.place-card.vis{background:var(--surface-2);opacity:.78;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.wx-day{flex:1;text-align:center;padding:9px 3px;border-radius:14px;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--e1);
  transition:transform var(--base) var(--ease);}
.wx-day:hover{transform:translateY(-2px);}
.map-wrap{width:100%;height:300px;border-radius:var(--r-lg);overflow:hidden;
  border:1px solid var(--border);box-shadow:var(--e2);}
/* Floating pill nav */
.nav-bar{position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  width:min(492px,calc(100% - 28px));display:flex;
  background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border:1px solid rgba(26,26,26,.06);
  border-radius:28px;padding:8px;box-shadow:var(--e3);z-index:1000;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;
  border-radius:20px;cursor:pointer;color:var(--ink-3);font-size:9.5px;font-weight:700;letter-spacing:.04em;
  transition:all var(--base) var(--ease);}
.nav-item.on{color:var(--pri);background:rgba(37,99,235,.10);}
.nav-item .ic{font-size:20px;transition:transform var(--base) var(--spring);}
.nav-item:active .ic{transform:scale(.85);}
.nav-item.on .ic{transform:translateY(-1px) scale(1.22);}
/* FAB */
.fab{position:fixed;right:max(18px,calc(50% - 242px));bottom:calc(86px + env(safe-area-inset-bottom));z-index:900;
  display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:none;
  font-size:13.5px;font-weight:700;padding:14px 20px;border-radius:var(--r-full);
  box-shadow:var(--e3);cursor:pointer;animation:fabIn .5s var(--spring) both .4s;
  transition:transform var(--base) var(--spring),box-shadow var(--base) var(--ease);}
.fab:hover{transform:scale(1.05);}
.fab:active{transform:scale(.93);}
@keyframes fabIn{from{opacity:0;transform:translateY(24px) scale(.8)}to{opacity:1;transform:none}}
.chip{padding:9px 15px;border-radius:var(--r-full);border:1.5px solid var(--border);
  font-size:12px;font-weight:600;background:#fff;cursor:pointer;white-space:nowrap;
  transition:all var(--base) var(--ease);box-shadow:var(--e1);}
.chip:hover{box-shadow:var(--e2);transform:translateY(-1px);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;
  padding:4px 10px;border-radius:var(--r-full);background:var(--acc-soft);color:var(--acc);}
.toast-wrap{position:fixed;top:calc(env(safe-area-inset-top) + 12px);left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:440px;pointer-events:none;}
.toast{background:var(--ink);color:#fff;padding:13px 17px;border-radius:18px;font-size:13px;
  font-weight:600;box-shadow:var(--e3);display:flex;align-items:center;gap:10px;
  animation:tIn .35s var(--spring);}
@keyframes tIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.off-banner{background:var(--red);color:#fff;text-align:center;padding:8px 16px;font-size:12px;
  font-weight:800;position:relative;z-index:5;}
.photo-grid{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.photo-thumb{width:64px;height:64px;border-radius:14px;object-fit:cover;border:2px solid var(--border);cursor:pointer;
  transition:transform var(--base) var(--ease);}
.photo-thumb:hover{transform:scale(1.08);}
.photo-add{width:64px;height:64px;border-radius:14px;border:2px dashed var(--border);
  display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;background:var(--surface-2);
  transition:background var(--base) var(--ease);}
.photo-add:hover{background:#ECE6DD;}
.photo-full{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:3000;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.poll-opt{padding:13px 15px;border-radius:14px;border:1.5px solid var(--border);
  margin-bottom:8px;cursor:pointer;transition:all var(--base) var(--ease);position:relative;overflow:hidden;}
.poll-opt:hover{box-shadow:var(--e1);}
.poll-opt.voted{border-color:var(--pri);background:rgba(37,99,235,.05);}
.poll-opt.closed{cursor:default;opacity:.85;}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(37,99,235,.08);transition:width .5s var(--ease);}
.conv-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.12);}
.conv-row:last-child{border-bottom:none;}
.route-badge{width:25px;height:25px;border-radius:50%;background:var(--acc);color:#fff;
  font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;
  border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.del-btn{width:24px;height:24px;border-radius:50%;background:rgba(228,84,63,.1);color:var(--red);
  display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;
  transition:background var(--base) var(--ease);}
.del-btn:hover{background:rgba(228,84,63,.2);}
.prog{height:8px;border-radius:4px;background:var(--surface-2);overflow:hidden;}
.prog>div{height:100%;border-radius:4px;transition:width .6s var(--ease);}
.check{width:26px;height:26px;border-radius:9px;flex-shrink:0;border:2px solid #D1CAC3;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all var(--fast) var(--spring);}
.check:active{transform:scale(1.2);}
.check.on{background:var(--green);border-color:var(--green);color:#fff;}
.empty{text-align:center;color:var(--ink-3);font-size:13px;padding:36px 20px;animation:fadeUp .45s var(--ease) both;}
.empty .big{font-size:42px;margin-bottom:8px;}
.list-row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);
  border-radius:18px;padding:13px 15px;margin-bottom:9px;box-shadow:var(--e1);
  transition:transform var(--base) var(--ease),box-shadow var(--base) var(--ease);
  animation:fadeUp .45s var(--ease) both;}
.list-row:hover{box-shadow:var(--e2);}
.list-row:nth-child(odd){animation-delay:.05s}.list-row:nth-child(even){animation-delay:.12s}
.sec-title{font-size:11px;font-weight:800;color:var(--ink-3);text-transform:uppercase;
  letter-spacing:.07em;margin:4px 0 10px;}
.bal-hero{background:linear-gradient(150deg,#2563EB,#4F46E5);border-radius:24px;
  padding:20px;color:#fff;box-shadow:var(--e2);margin-bottom:14px;cursor:pointer;
  transition:transform var(--base) var(--ease),box-shadow var(--base) var(--ease);
  animation:fadeUp .45s var(--ease) both;}
.bal-hero:hover{box-shadow:var(--e3);}
.bal-hero:active{transform:scale(.98);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.spinner{width:38px;height:38px;border:3px solid var(--surface-2);border-top-color:var(--pri);
  border-radius:50%;animation:spin .8s linear infinite;}
/* ── Yükleme: spinner yerine ilerleme çubuğu ── */
.loadbar{width:min(260px,70vw);height:6px;border-radius:3px;background:var(--surface-2);overflow:hidden;position:relative;}
.loadbar>div{position:absolute;top:0;bottom:0;width:40%;border-radius:3px;
  background:linear-gradient(90deg,#3B82F6,#4F46E5);animation:loadSlide 1.1s var(--ease) infinite;}
@keyframes loadSlide{0%{left:-40%}100%{left:100%}}
/* ── Giriş ekranı (Travel Connect uyarlaması) ── */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
  background:linear-gradient(135deg,#EFF6FF,#E0E7FF);}
.login-card{width:100%;max-width:880px;display:flex;background:#fff;border-radius:24px;
  overflow:hidden;box-shadow:0 25px 60px rgba(37,99,235,.18);animation:loginIn .5s var(--ease) both;}
@keyframes loginIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.login-left{display:none;width:50%;min-height:560px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#EFF6FF,#E0E7FF);border-right:1px solid #F1F5F9;}
@media(min-width:768px){.login-left{display:block;}}
.login-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px;z-index:10;text-align:center;}
.login-logo{height:52px;width:52px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#4F46E5);
  display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;
  box-shadow:0 10px 26px rgba(59,130,246,.35);margin-bottom:20px;animation:fadeUp .5s var(--ease) both .5s;}
.login-title{font-size:28px;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(90deg,#2563EB,#4F46E5);-webkit-background-clip:text;background-clip:text;
  color:transparent;animation:fadeUp .5s var(--ease) both .6s;}
.login-sub{font-size:13px;color:#64748B;max-width:280px;margin-top:8px;animation:fadeUp .5s var(--ease) both .7s;}
.login-right{width:100%;padding:36px 28px;display:flex;flex-direction:column;justify-content:center;background:#fff;}
@media(min-width:768px){.login-right{width:50%;padding:48px 40px;}}
.gbtn{position:relative;overflow:hidden;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  background:#F8FAFC;border:1px solid #E2E8F0;border-radius:14px;padding:14px;color:#334155;
  font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 1px 3px rgba(15,23,42,.06);
  transition:background var(--base) var(--ease),transform var(--fast) var(--ease),box-shadow var(--base) var(--ease);}
.gbtn:hover{background:#F1F5F9;box-shadow:0 8px 20px rgba(37,99,235,.12);}
.gbtn:active{transform:scale(.97);}
.gbtn::after{content:"";position:absolute;top:0;bottom:0;left:-30%;width:24%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);filter:blur(8px);
  animation:shine 3.2s var(--ease) infinite 1.2s;}
@keyframes shine{0%{left:-30%}45%{left:110%}100%{left:110%}}
/* ── Intro kart animasyonu (giriş ekranı üst bölüm) ── */
.login2{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,#EFF6FF 0%,#E0E7FF 100%);}
.intro-area{flex:1;position:relative;overflow:hidden;min-height:0;}
.intro-ring{position:absolute;inset:0;}
.intro-ring.spin{animation:spinSlow 60s linear infinite;transform-origin:50% 50%;}
@keyframes spinSlow{to{transform:rotate(360deg)}}
.fcard{position:absolute;left:50%;top:50%;width:56px;height:80px;margin:-40px 0 0 -28px;
  perspective:600px;cursor:pointer;
  transition:transform 1s var(--spring),opacity .7s var(--ease);will-change:transform;}
.fcard-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .6s var(--spring);}
.fcard:hover .fcard-inner{transform:rotateY(180deg);}
.fcard-front,.fcard-back{position:absolute;inset:0;border-radius:12px;overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  box-shadow:0 6px 16px rgba(37,99,235,.22);}
.fcard-front img{width:100%;height:100%;object-fit:cover;display:block;}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, p1 = lat1*Math.PI/180, p2 = lat2*Math.PI/180;
  const dp = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function compressImg(file, max = 420, q = 0.5) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > h) { if (w > max) { h = h*max/w; w = max; } }
        else { if (h > max) { w = w*max/h; h = max; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        res(canvas.toDataURL("image/jpeg", q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
// Hesaplaşma — kimlikler uid string'i (eski sayısal kimlikler String() ile aynı haritada)
function settle(exps, ids, cur) {
  const bal = {};
  ids.forEach(id => bal[id] = 0);
  exps.filter(e => e.currency === cur).forEach(e => {
    const amt = parseFloat(e.amount) || 0, sp = (e.splitAmong || []).length;
    if (!sp) return;
    const pb = String(e.paidBy);
    bal[pb] = (bal[pb] || 0) + amt;
    (e.splitAmong || []).forEach(i => { const k = String(i); bal[k] = (bal[k] || 0) - amt/sp; });
  });
  const entries = Object.entries(bal).map(([id, v]) => ({ id, v }));
  const txs = [];
  for (let i = 0; i < 100; i++) {
    entries.sort((a, b) => b.v - a.v);
    const mx = entries[0], mn = entries[entries.length-1];
    if (!mx || !mn || mx.v < 0.01 || -mn.v < 0.01) break;
    const a = Math.min(mx.v, -mn.v);
    txs.push({ from: mn.id, to: mx.id, amt: a });
    mx.v -= a; mn.v += a;
  }
  return { bal, txs };
}

function PlaceImage({ name }) {
  const [src, setSrc] = React.useState(null);
  React.useEffect(() => {
    if (!name) return;
    let cancelled = false;
    // Step 1: fuzzy search to find the best matching Wikipedia article title
    fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name)}&srlimit=3&format=json&origin=*`)
      .then(r => r.json())
      .then(d => {
        if (cancelled) return;
        const results = d.query?.search || [];
        if (!results.length) return;
        // Pick first result title, then fetch its thumbnail
        const title = results[0].title;
        return fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&format=json&pithumbsize=500&origin=*`);
      })
      .then(r => r && r.json())
      .then(d => {
        if (cancelled || !d) return;
        const pages = Object.values(d.query?.pages || {});
        const thumb = pages[0]?.thumbnail?.source;
        if (thumb) setSrc(thumb);
      })
      .catch(() => {});
    return () => { cancelled = true; };
  }, [name]);
  if (!src) return null;
  return <img src={src} alt={name} style={{width:"100%",borderRadius:10,marginBottom:8,maxHeight:180,objectFit:"cover",display:"block",boxShadow:"0 2px 8px rgba(0,0,0,.12)"}}/>;
}

function IntroCards() {
  const N = INTRO_IMGS.length;
  const ref = useRef(null);
  const [phase, setPhase] = useState("scatter"); // scatter → line → circle
  const [size, setSize] = useState({ w: 360, h: 360 });
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const ro = new ResizeObserver(es => {
      const r = es[0].contentRect;
      setSize({ w: r.width, h: r.height });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  useEffect(() => {
    const t1 = setTimeout(() => setPhase("line"), 450);
    const t2 = setTimeout(() => setPhase("circle"), 2100);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  const scatter = useMemo(() => INTRO_IMGS.map(() => ({
    x: (Math.random() - .5) * 900,
    y: (Math.random() - .5) * 700,
    r: (Math.random() - .5) * 180,
    s: .5, o: 0
  })), []);
  const targets = INTRO_IMGS.map((_, i) => {
    if (phase === "scatter") return scatter[i];
    if (phase === "line") {
      const spacing = Math.min(52, (size.w - 70) / N);
      return { x: i * spacing - (N - 1) * spacing / 2, y: 0, r: 0, s: 1, o: 1 };
    }
    const radius = Math.min(size.w, size.h) * 0.36;
    const ang = (i / N) * 360;
    const rad = ang * Math.PI / 180;
    return { x: Math.cos(rad) * radius, y: Math.sin(rad) * radius, r: ang + 90, s: 1, o: 1 };
  });
  return (
    <div ref={ref} className="intro-area">
      <div className={phase === "circle" ? "intro-ring spin" : "intro-ring"}>
        {INTRO_IMGS.map((src, i) => {
          const t = targets[i];
          return (
            <div key={i} className="fcard" style={{
              transform: `translate(${t.x}px,${t.y}px) rotate(${t.r}deg) scale(${t.s})`,
              opacity: t.o,
              transitionDelay: phase === "circle" ? `${i * 35}ms` : `${i * 22}ms`
            }}>
              <div className="fcard-inner">
                <div className="fcard-front"><img src={src} alt="" loading="lazy"/></div>
                <div className="fcard-back">📍</div>
              </div>
            </div>
          );
        })}
      </div>
      <div className={`intro-center${phase === "circle" ? " show" : ""}`}>
        <div style={{fontSize:34}}>🧭</div>
        <div className="login-title" style={{fontSize:24}}>Gezi Rotası</div>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".18em",color:"#94A3B8",marginTop:6}}>BİRLİKTE KEŞFEDİN</div>
      </div>
    </div>
  );
}

// ── ANA UYGULAMA ─────────────────────────────────────────────────────────────
const initExp = { desc:"", amount:"", currency:"EUR", paidBy:null, splitAmong:[], category:"food", city:"bremen", receipt:null };
const initPl  = { name:"", desc:"", url:"" };
const initPoll = { question:"", options:["",""], multi:false, deadline:"" };

function App() {
  // Oturum
  const [user, setUser] = useState(undefined);   // undefined: kontrol, null: çıkış yapılmış
  const [authErr, setAuthErr] = useState(null);
  const myUid = user ? user.uid : null;
  const [nameForm, setNameForm] = useState({ first:"", last:"" });
  const [showNameEdit, setShowNameEdit] = useState(false);
  // E-posta giriş formu ("" | "login" | "register" | "reset")
  const [emailMode, setEmailMode] = useState("");
  const [emailForm, setEmailForm] = useState({ email:"", pass:"", pass2:"" });
  const [emailLoading, setEmailLoading] = useState(false);
  // Kullanıcı profili ve geziler (null = henüz yüklenmedi)
  const [userProfile, setUserProfile] = useState(undefined);  // undefined: yükleniyor, null: yok
  const [myTrips, setMyTrips] = useState(null);               // null: yükleniyor, []: boş
  // Aktif gezi
  const [activeTrip, setActiveTrip] = useState(() => {
    const s = localStorage.getItem("gezi_trip");
    return s && s !== "default" ? s : null;
  });
  // Davet linki: ?join=tripId
  const [pendingJoin, setPendingJoin] = useState(() => window._joinParam);
  // Veri
  const [fData, setFData] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [isOnline, setIsOnline] = useState(true);
  const [toasts, setToasts] = useState([]);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== "undefined" ? Notification.permission : "denied");
  // Sekmeler
  const [tab, setTab] = useState("rota");
  const [planSub, setPlanSub] = useState("gun");
  const [masrafSub, setMasrafSub] = useState("harcama");
  const [city, setCity] = useState(null);
  const [dayFilter, setDayFilter] = useState(0);
  // Dış veriler
  const [wxData, setWxData] = useState(null);
  const [rates, setRates] = useState({ EUR:1, TRY:38.5, USD:1.08, DKK:7.46 });
  // Modallar
  const [showAddPl, setShowAddPl] = useState(false);
  const [showAddExp, setShowAddExp] = useState(false);
  const [showAddCity, setShowAddCity] = useState(false);
  const [showDelExp, setShowDelExp] = useState(null);
  const [showPollCreate, setShowPollCreate] = useState(false);
  const [viewPhoto, setViewPhoto] = useState(null);
  const [showConv, setShowConv] = useState(false);
  const [showBudget, setShowBudget] = useState(false);
  const [showAddTrip, setShowAddTrip] = useState(false);
  // Formlar
  const [newPl, setNewPl] = useState(initPl);
  const [newExp, setNewExp] = useState(initExp);
  const [newCity, setNewCity] = useState({ name:"", emoji:"📍" });
  const [touristSpots, setTouristSpots] = useState(null); // { cityId, spots:[] } — ask to add
  const [newPoll, setNewPoll] = useState(initPoll);
  const [newPack, setNewPack] = useState("");
  const [newNote, setNewNote] = useState("");
  const [newTrip, setNewTrip] = useState({ name:"", emoji:"✈️", startDate:"", endDate:"" });
  const [budgetForm, setBudgetForm] = useState({ amount:"", currency:"EUR" });
  // Rota / konum
  const [routeMode, setRouteMode] = useState(false);
  const [routeIds, setRouteIds] = useState([]);
  const [userLoc, setUserLoc] = useState(null);
  const [nearbyMode, setNearbyMode] = useState(false);
  const [chartCur, setChartCur] = useState("EUR");
  const [convAmt, setConvAmt] = useState("100");
  const [convBase, setConvBase] = useState("EUR");
  // Ref'ler
  const mapRef = useRef(null), polyRef = useRef(null), userMarkerRef = useRef(null);
  const memberMarkersRef = useRef([]);
  const routeMarkersRef = useRef([]);
  const mapCityRef = useRef(null), firstLoad = useRef(true), seenIds = useRef(new Set()), seenTrips = useRef(new Set());
  const fileInputRef = useRef({}), receiptInputRef = useRef(null);

  // ── Toast
  const toast = (msg, icon = "📢") => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, icon }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4500);
  };

  // ── İsim çözümleme (uid → üye, eski sayısal kimlik → LEGACY_MEMBERS)
  const mName = id => {
    const mems = (fData && fData.members) || {};
    if (mems[id]) return mems[id].name;
    const n = parseInt(id, 10);
    if (!isNaN(n) && String(n) === String(id) && LEGACY_MEMBERS[n]) return LEGACY_MEMBERS[n];
    return "?";
  };

  // ── Google oturumu
  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged(u => setUser(u));
    firebase.auth().getRedirectResult().catch(e => { if (e.code !== "auth/no-auth-event") setAuthErr(e.message); });
    return unsub;
  }, []);
  const doLogin = async () => {
    setAuthErr(null);
    const provider = new firebase.auth.GoogleAuthProvider();
    try { await firebase.auth().signInWithPopup(provider); }
    catch (e) {
      if (["auth/popup-blocked","auth/popup-closed-by-user","auth/cancelled-popup-request"].includes(e.code)) {
        try { await firebase.auth().signInWithRedirect(provider); } catch (e2) { setAuthErr(e2.message); }
      } else setAuthErr(e.message);
    }
  };
  const doLogout = () => { firebase.auth().signOut(); setFData(null); };

  // ── E-posta / şifre oturumu
  const doEmailLogin = async () => {
    setAuthErr(null); setEmailLoading(true);
    try { await firebase.auth().signInWithEmailAndPassword(emailForm.email.trim(), emailForm.pass); }
    catch (e) {
      const map = { "auth/user-not-found":"Bu e-posta ile hesap bulunamadı.", "auth/wrong-password":"Şifre hatalı.",
        "auth/invalid-email":"Geçersiz e-posta adresi.", "auth/too-many-requests":"Çok fazla deneme. Lütfen bekleyin." };
      setAuthErr(map[e.code] || e.message);
    }
    setEmailLoading(false);
  };
  const doEmailRegister = async () => {
    setAuthErr(null);
    if (emailForm.pass !== emailForm.pass2) { setAuthErr("Şifreler eşleşmiyor."); return; }
    if (emailForm.pass.length < 6) { setAuthErr("Şifre en az 6 karakter olmalı."); return; }
    setEmailLoading(true);
    try { await firebase.auth().createUserWithEmailAndPassword(emailForm.email.trim(), emailForm.pass); }
    catch (e) {
      const map = { "auth/email-already-in-use":"Bu e-posta zaten kayıtlı.", "auth/invalid-email":"Geçersiz e-posta adresi.",
        "auth/weak-password":"Şifre çok zayıf." };
      setAuthErr(map[e.code] || e.message);
    }
    setEmailLoading(false);
  };
  const doResetPassword = async () => {
    if (!emailForm.email.trim()) { setAuthErr("Lütfen e-posta adresinizi girin."); return; }
    setAuthErr(null); setEmailLoading(true);
    try {
      await firebase.auth().sendPasswordResetEmail(emailForm.email.trim());
      setAuthErr("✅ Şifre sıfırlama linki e-postanıza gönderildi.");
    } catch (e) { setAuthErr(e.message); }
    setEmailLoading(false);
  };

  // ── Kullanıcı profili + geziler indeksi
  useEffect(() => {
    if (!user) { setUserProfile(undefined); setMyTrips(null); return; }
    const db = window._db;
    const uid = user.uid;
    const rc = db.ref(".info/connected");
    rc.on("value", s => setIsOnline(s.val() === true));
    // /users/{uid}/ → profil + geziler indeksi
    const uRef = db.ref(`users/${uid}`);
    uRef.on("value", s => {
      const d = s.val() || {};
      setUserProfile(d.profile || null);
      setMyTrips(Object.values(d.trips || {}));
    });
    return () => { rc.off(); uRef.off(); };
  }, [user]);

  // ── Aktif gezi verisi
  useEffect(() => {
    if (!user || !activeTrip) { setFData(null); return; }
    setFData(null);
    const rd = window._db.ref(`trips/${activeTrip}`);
    rd.on("value", s => {
      const d = s.val() || {};
      setFData(d);
      setCity(c => c || Object.keys(d.cities || {})[0] || null);
    },
      err => { console.error(err); setAuthErr("Veriye erişim reddedildi. Gezi kurallarını kontrol edin."); });
    return () => rd.off();
  }, [user, activeTrip]);

  // ── Yazma fonksiyonları
  const wrRaw = (path, val) => {
    setSyncing(true);
    const done = () => setSyncing(false);
    const p = window._db.ref(`trips/${activeTrip}/${path}`).set(val);
    p.then(done).catch(err => { console.error(err); toast("Kaydedilemedi! Bağlantıyı kontrol et.", "⚠️"); done(); });
    setTimeout(done, 2000);
    return p;
  };
  const wr = wrRaw;
  // Kullanıcı profil yazma
  const wrUser = (path, val) => window._db.ref(`users/${myUid}/${path}`).set(val);

  // ── Aktif gezi verisi (TD = trip data)
  const TD = fData || {};

  // ── Gezi yönetimi
  const switchTrip = id => {
    setActiveTrip(id);
    localStorage.setItem("gezi_trip", id);
    setCity(null); setRouteIds([]); setNearbyMode(false); setDayFilter(0);
    firstLoad.current = true;
  };
  const createTrip = (name, emoji, startDate, endDate) => {
    const id = "trip_" + newId();
    const meta = { id, name, emoji: emoji || "✈️", ownerUid: myUid, createdAt: Date.now(), ...(startDate && { startDate }), ...(endDate && { endDate }) };
    const memberEntry = { uid: myUid, name: userProfile?.name || "?", email: user?.email || "", role: "owner", joinedAt: Date.now() };
    const userTripEntry = { ...meta, role: "owner" };
    const updates = {};
    updates[`trips/${id}/meta`] = meta;
    updates[`trips/${id}/members/${myUid}`] = memberEntry;
    updates[`users/${myUid}/trips/${id}`] = userTripEntry;
    window._db.ref().update(updates);
    switchTrip(id);
    toast("Gezi oluşturuldu! 🎉", "✈️");
  };
  const joinTrip = async (tripId) => {
    if (!tripId) return;
    try {
      const snap = await window._db.ref(`trips/${tripId}/meta`).once("value");
      const meta = snap.val();
      if (!meta) { toast("Geçersiz davet linki.", "❌"); return; }
      const memberEntry = { uid: myUid, name: userProfile?.name || "?", email: user?.email || "", role: "editor", joinedAt: Date.now() };
      const userTripEntry = { ...meta, role: "editor" };
      const updates = {};
      updates[`trips/${tripId}/members/${myUid}`] = memberEntry;
      updates[`users/${myUid}/trips/${tripId}`] = userTripEntry;
      await window._db.ref().update(updates);
      // URL'den join parametresini temizle
      try { const u = new URL(location.href); u.searchParams.delete("join"); history.replaceState({}, "", u.toString()); } catch {}
      switchTrip(tripId);
      toast(`"${meta.name}" gezisine katıldın!`, "🎉");
    } catch(e) { toast("Geziye katılırken hata oluştu.", "❌"); }
  };
  const leaveTrip = async (tripId) => {
    const updates = {};
    updates[`trips/${tripId}/members/${myUid}`] = null;
    updates[`users/${myUid}/trips/${tripId}`] = null;
    await window._db.ref().update(updates);
    if (activeTrip === tripId) { setActiveTrip(null); localStorage.removeItem("gezi_trip"); }
    toast("Geziden ayrıldın.", "👋");
  };
  const deleteTrip = async (tripId) => {
    // Remove trip data + all member index entries
    const snap = await window._db.ref(`trips/${tripId}/members`).once("value");
    const updates = {};
    updates[`trips/${tripId}`] = null;
    Object.keys(snap.val() || {}).forEach(uid => { updates[`users/${uid}/trips/${tripId}`] = null; });
    await window._db.ref().update(updates);
    if (activeTrip === tripId) { setActiveTrip(null); localStorage.removeItem("gezi_trip"); }
    toast("Gezi silindi.", "🗑️");
  };
  const getInviteLink = () => {
    try {
      const u = new URL(location.href);
      u.searchParams.set("join", activeTrip);
      return u.toString();
    } catch { return location.href + "?join=" + activeTrip; }
  };

  // ── Bildirim tespiti
  useEffect(() => {
    if (!fData) return;
    const reg = (pfx, obj) => Object.keys(obj || {}).forEach(id => seenIds.current.add(pfx + activeTrip + id));
    if (firstLoad.current || !seenTrips.current.has(activeTrip)) {
      reg("e", TD.expenses); reg("p", TD.customPlaces); reg("po", TD.polls);
      seenTrips.current.add(activeTrip);
      firstLoad.current = false;
      return;
    }
    Object.values(TD.expenses || {}).forEach(e => {
      const k = "e" + activeTrip + e.id;
      if (seenIds.current.has(k)) return;
      seenIds.current.add(k);
      const msg = `${mName(e.paidBy)} masraf ekledi: ${e.desc} (${e.amount}${SYM[e.currency] || ""})`;
      toast(msg, "💸");
      if (notifPerm === "granted" && document.hidden) try { new Notification("Gezi Rotası", { body: msg }); } catch {}
    });
    Object.values(TD.customPlaces || {}).forEach(p => {
      const k = "p" + activeTrip + p.id;
      if (seenIds.current.has(k)) return;
      seenIds.current.add(k);
      toast(`${mName(p.addedBy)} mekan önerdi: ${p.name}`, "📍");
    });
    Object.values(TD.polls || {}).forEach(p => {
      const k = "po" + activeTrip + p.id;
      if (seenIds.current.has(k)) return;
      seenIds.current.add(k);
      toast(`${mName(p.createdBy)} anket açtı: ${p.question}`, "🗳️");
    });
  }, [fData, activeTrip]);

  // ── Hava + kur
  const allCitiesNow = fData ? [...DEFAULT_CITIES, ...Object.values(TD.cities || {})] : DEFAULT_CITIES;
  useEffect(() => {
    if (!fData) return;
    const c = allCitiesNow.find(x => x.id === city);
    if (!c || !c.lat) return;
    setWxData(null);
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`)
      .then(r => r.json()).then(d => setWxData(d)).catch(() => {});
    fetch("https://open.er-api.com/v6/latest/EUR").then(r => r.json()).then(d => {
      if (d.rates) setRates({ EUR:1, TRY:d.rates.TRY || 38.5, USD:d.rates.USD || 1.08, DKK:d.rates.DKK || 7.46 });
    }).catch(() => {});
  }, [city, activeTrip, fData && TD.cities]);

  // ── Harita
  useEffect(() => {
    if (tab !== "rota" || !fData) return;
    const timer = setTimeout(() => {
      const c = allCitiesNow.find(x => x.id === city);
      const el = document.getElementById("leafmap");
      if (!c || !el) return;
      const places = [...(STATIC_PLACES[city] || []), ...Object.values(TD.customPlaces || {}).filter(p => p.city === city)];
      if (mapCityRef.current !== activeTrip + city) {
        if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; polyRef.current = null; userMarkerRef.current = null; memberMarkersRef.current = []; routeMarkersRef.current = []; }
        const m = L.map(el).setView([c.lat, c.lon], 14);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OSM" }).addTo(m);
        places.forEach(p => {
          if (!p.lat || !p.lon) return;
          L.circleMarker([p.lat, p.lon], { radius:8, fillColor:"#4F46E5", color:"#fff", weight:3, fillOpacity:.9 })
            .addTo(m).bindPopup(`<b>${esc(p.name)}</b><br><small>${esc(p.desc || "")}</small>`);
        });
        mapRef.current = m;
        mapCityRef.current = activeTrip + city;
      }
      // Rota çizgisi + numaralı işaretçiler
      if (polyRef.current) { mapRef.current?.removeLayer(polyRef.current); polyRef.current = null; }
      routeMarkersRef.current.forEach(mk => mapRef.current?.removeLayer(mk));
      routeMarkersRef.current = [];
      if (routeIds.length >= 2 && mapRef.current) {
        const routePts = routeIds.map(id => places.find(p => p.id === id)).filter(p => p && p.lat);
        const latlngs = routePts.map(p => [p.lat, p.lon]);
        if (latlngs.length >= 2) {
          polyRef.current = L.polyline(latlngs, { color:"#4F46E5", weight:4, dashArray:"10,6", opacity:.85 }).addTo(mapRef.current);
          routePts.forEach((p, i) => {
            const mk = L.marker([p.lat, p.lon], { icon: L.divIcon({
              className: "",
              html: `<div style="background:#4F46E5;color:#fff;width:26px;height:26px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.3)">${i+1}</div>`,
              iconSize:[26,26], iconAnchor:[13,13]
            })}).addTo(mapRef.current).bindPopup(`<b>${esc(p.name)}</b>`);
            routeMarkersRef.current.push(mk);
          });
          mapRef.current.fitBounds(L.latLngBounds(latlngs), { padding:[30,30] });
        }
      }
      // Kendi konumum
      if (userMarkerRef.current) { mapRef.current?.removeLayer(userMarkerRef.current); userMarkerRef.current = null; }
      if (userLoc && mapRef.current) {
        userMarkerRef.current = L.circleMarker([userLoc.lat, userLoc.lon], { radius:10, fillColor:"#2196F3", color:"#fff", weight:3, fillOpacity:.9 })
          .addTo(mapRef.current).bindPopup("📍 Konumun");
      }
      // Üyelerin paylaştığı konumlar (son 12 saat)
      memberMarkersRef.current.forEach(mk => mapRef.current?.removeLayer(mk));
      memberMarkersRef.current = [];
      if (mapRef.current) {
        Object.values(fData.members || {}).forEach(mb => {
          if (!mb.loc || mb.uid === myUid) return;
          if (Date.now() - (mb.loc.ts || 0) > 12*3600*1000) return;
          const mk = L.circleMarker([mb.loc.lat, mb.loc.lon], { radius:9, fillColor:"#7B5EA7", color:"#fff", weight:3, fillOpacity:.9 })
            .addTo(mapRef.current).bindPopup(`👤 ${esc(mb.name)}<br><small>${esc(fmtTime(mb.loc.ts))}</small>`);
          memberMarkersRef.current.push(mk);
        });
      }
    }, 80);
    return () => clearTimeout(timer);
  }, [city, tab, fData, routeIds, userLoc, activeTrip]);
  useEffect(() => () => { mapRef.current?.remove(); }, []);

  // ── Konum
  const getLocation = (share) => {
    if (!navigator.geolocation) { toast("Cihazın konum özelliği desteklenmiyor.", "❌"); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      const loc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      setUserLoc(loc);
      if (share) {
        wrRaw(`members/${myUid}/loc`, { ...loc, ts: Date.now() });
        toast("Konumun grupla paylaşıldı!", "📡");
      } else {
        setNearbyMode(true);
        toast("Konumun bulundu! Yakındaki mekanlar listeleniyor.", "📍");
      }
    }, () => toast("Konum izni reddedildi.", "❌"));
  };

  // ── Bildirim izni
  const askNotif = async () => {
    if (typeof Notification === "undefined") return;
    const p = await Notification.requestPermission();
    setNotifPerm(p);
    if (p === "granted") toast("Bildirimler açıldı!", "🔔");
  };

  // ── Fotoğraflar
  const handlePhoto = async (placeId, file) => {
    if (!file) return;
    toast("Fotoğraf yükleniyor…", "⏳");
    const data = await compressImg(file);
    const id = newId();
    wr(`placePhotos/${placeId}/${id}`, { data, id, uploadedBy: myUid, ts: Date.now() });
    toast("Fotoğraf yüklendi!", "📸");
  };

  // ── useMemo'lar (koşullu return'lerden önce)
  const nearbyPlaces = useMemo(() => {
    if (!fData || !userLoc || !nearbyMode) return null;
    const cp = [...(STATIC_PLACES[city] || []), ...Object.values(TD.customPlaces || {}).filter(p => p.city === city)];
    return cp.map(p => ({ ...p, dist: haversine(userLoc.lat, userLoc.lon, p.lat || 0, p.lon || 0) }))
      .filter(p => p.dist < 600).sort((a, b) => a.dist - b.dist);
  }, [userLoc, nearbyMode, city, fData, activeTrip]);
  const routeStats = useMemo(() => {
    if (!fData || routeIds.length < 2) return null;
    const allP = [...(STATIC_PLACES[city] || []), ...Object.values(TD.customPlaces || {}).filter(p => p.city === city)];
    const ordered = routeIds.map(id => allP.find(p => p.id === id)).filter(Boolean);
    let total = 0;
    for (let i = 0; i < ordered.length - 1; i++) {
      const a = ordered[i], b = ordered[i+1];
      if (a.lat && b.lat) total += haversine(a.lat, a.lon, b.lat, b.lon);
    }
    return { dist: total, min: walkMin(total), stops: routeIds.length, places: ordered };
  }, [routeIds, city, fData, activeTrip]);
  const convResult = useMemo(() => {
    const amt = parseFloat(convAmt) || 0;
    const inEUR = amt / (rates[convBase] || 1);
    return Object.entries(rates).map(([cur, r]) => ({ cur, val: (inEUR * r).toFixed(2) }));
  }, [convAmt, convBase, rates]);

  // ── Giriş ekranı: üstte kart animasyonu, altta giriş paneli
  if (user === null) return (
    <div className="login2">
      <IntroCards/>
      <div className="login-sheet">
        <h1 style={{fontSize:22,fontWeight:800,color:"#1E293B",marginBottom:3,letterSpacing:"-.01em"}}>
          {emailMode==="register"?"Hesap Oluştur":emailMode==="reset"?"Şifre Sıfırla":"Tekrar hoş geldin"}
        </h1>

  const cityPlaces = [...(STATIC_PLACES[city] || []), ...customCityPl];
  const cityVisCount = cityPlaces.filter(p => visited[p.id]).length;

  const partSet = new Set(memberList.map(m => String(m.uid)));

    (e.splitAmong || []).forEach(s => partSet.add(String(s)));
  });
  const participants = [...partSet];
  const eurRes = settle(expenses, participants, "EUR");
  const tryRes = settle(expenses, participants, "TRY");
  const usdRes = settle(expenses, participants, "USD");
  const toggleRoute = id => setRouteIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

  const budgetSpent = budget ? expenses.filter(e => e.currency === budget.currency && !e.isSettlement).reduce((s, e) => s + (parseFloat(e.amount) || 0), 0) : 0;
  const budgetPct = budget && budget.amount > 0 ? Math.min(100, budgetSpent / budget.amount * 100) : 0;
  const budgetColor = budgetPct >= 90 ? "var(--red)" : budgetPct >= 70 ? "var(--amber)" : "var(--green)";

  const pollClosed = p => p.deadline && Date.now() > p.deadline;

    v === oi || (v && typeof v === "object" && v[oi])).length;
  const votedAny = votes => Object.keys(votes || {}).length;
  const myVoted = (p, oi) => {

    return v === oi || (v && typeof v === "object" && !!v[oi]);

            const id = "city_" + newId();
            const cityName = newCity.name.trim();
            // Nominatim geocode
            let lat = 51, lon = 10;
            try {
              const geo = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1`).then(r => r.json());

            // Overpass tourist spots — nodes + ways, broad tag coverage

              const r = 6000, ll = `${lat},${lon}`;
              // Query both nodes and ways; center coords for ways via "out center"
              const q = `[out:json][timeout:15];(
                node["tourism"~"^(attraction|viewpoint)$"](around:${r},${ll});
                way["tourism"~"^(attraction|viewpoint)$"](around:${r},${ll});
                node["historic"~"^(monument|castle|ruins|building|bridge|city_gate|memorial|archaeological_site|fort|palace|tower)$"](around:${r},${ll});
                way["historic"~"^(monument|castle|ruins|building|bridge|city_gate|memorial|archaeological_site|fort|palace|tower)$"](around:${r},${ll});

                way["tourism"="museum"](around:${r},${ll});
              );out center 40;`;
              const ov = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`).then(r => r.json());
              const named = (ov.elements || []).filter(e => e.tags?.name);
              // Deduplicate by name, prefer ways over nodes (ways have more detail)
              const seen = new Map();
              for (const e of named) {
                const key = e.tags.name.toLowerCase();
                if (!seen.has(key) || e.type === "way") seen.set(key, e);
              }
              const all = [...seen.values()].map(e => {
                const elat = e.type === "way" ? e.center?.lat : e.lat;
                const elon = e.type === "way" ? e.center?.lon : e.lon;
                const t = e.tags;
                const isMuseum = t.tourism === "museum" || t.amenity === "arts_centre";
                const desc = t.historic || t.tourism || t.natural || "";
                const url = elat && elon ? `https://www.google.com/maps/@${elat},${elon},17z?q=${encodeURIComponent(t.name)}` : `https://maps.google.com/?q=${encodeURIComponent(t.name)}`;
                return { id:"place_"+e.id, name:t.name, desc, lat:elat, lon:elon, city:id, isMuseum, sortOrder:0, url };
              });
              // Up to 3 museums + up to 9 landmarks, ranked by name length (shorter = more famous)
              const museums = all.filter(s => s.isMuseum).sort((a,b) => a.name.length - b.name.length).slice(0,3);
              const landmarks = all.filter(s => !s.isMuseum).sort((a,b) => a.name.length - b.name.length).slice(0,9);
              const spots = [...landmarks, ...museums].map((s,i) => ({ ...s, sortOrder:i, isMuseum:undefined }));
              if (spots.length > 0) setTouristSpots({ cityId: id, cityName, spots });
            } catch(err) { console.warn("Overpass error", err); }
          }}>Ekle</button>
        </Modal>
      )}

      {touristSpots && (
        <Modal onClose={() => setTouristSpots(null)}>
          <ModalHead title={`🏛️ Turistik Noktalar`} onClose={() => setTouristSpots(null)}/>
          <div style={{fontSize:14,color:"var(--muted)",marginBottom:14}}>
            <b>{touristSpots.cityName}</b> için {touristSpots.spots.length} popüler yer bulundu. Hepsini ekleyeyim mi?
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:18,maxHeight:260,overflowY:"auto"}}>
            {touristSpots.spots.map(s => (
              <div key={s.id} style={{background:"var(--bg2)",borderRadius:10,padding:"8px 12px",fontSize:13}}>
                <b>{s.name}</b>{s.desc ? ` · ${s.desc}` : ""}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn-pri tap" style={{flex:1}} onClick={() => {
              const updates = {};
              touristSpots.spots.forEach((s, i) => { updates[`customPlaces/${s.id}`] = { ...s, sortOrder: i }; });
              window._db.ref(`trips/${activeTrip}`).update(updates);
              toast(`${touristSpots.spots.length} mekan eklendi!`, "🏛️");
              setTouristSpots(null);
            }}>Hepsini Ekle</button>
            <button className="btn-out tap" style={{flex:1}} onClick={() => setTouristSpots(null)}>Geç</button>
          </div>
        </Modal>
      )}

      {showAddTrip && (
        <Modal onClose={() => setShowAddTrip(false)}>
          <ModalHead title="✈️ Yeni Gezi" onClose={() => setShowAddTrip(false)}/>
          <label className="lbl">Gezi Adı</label>
          <input placeholder="Örn: Roma 2027" value={newTrip.name} style={{marginBottom:12}}
            onChange={e => setNewTrip({ ...newTrip, name: e.target.value })}/>
          <label className="lbl">Emoji</label>
          <input value={newTrip.emoji} maxLength={4} style={{marginBottom:10,width:90}}
            onChange={e => setNewTrip({ ...newTrip, emoji: e.target.value })}/>
          <label className="lbl">Tarih Aralığı</label>
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            <div style={{flex:1}}>
              <label className="lbl" style={{fontSize:11}}>Başlangıç</label>
              <input type="date" value={newTrip.startDate} onChange={e => setNewTrip({ ...newTrip, startDate: e.target.value })}/>
            </div>
            <div style={{flex:1}}>
              <label className="lbl" style={{fontSize:11}}>Bitiş</label>
              <input type="date" value={newTrip.endDate} onChange={e => setNewTrip({ ...newTrip, endDate: e.target.value })}/>
            </div>
          </div>
          <button className="btn-pri tap" onClick={() => {
            if (!newTrip.name.trim()) { toast("Gezi adı gerekli.", "⚠️"); return; }
            createTrip(newTrip.name.trim(), newTrip.emoji || "✈️", newTrip.startDate, newTrip.endDate);
            setShowAddTrip(false);
            setNewTrip({ name:"", emoji:"✈️", startDate:"", endDate:"" });
          }}>Oluştur ve Geç</button>
        </Modal>
      )}

      {showAddPl && (
        <Modal onClose={() => setShowAddPl(false)}>
          <ModalHead title="📌 Mekan Ekle" onClose={() => setShowAddPl(false)}/>
          <label className="lbl">Mekan Adı</label>
          <input placeholder="Tarihi Köprü" style={{marginBottom:12}} value={newPl.name}
            onChange={e => setNewPl({ ...newPl, name: e.target.value })}/>
          <label className="lbl">Açıklama</label>
          <textarea placeholder="Kısa açıklama…" style={{height:72,marginBottom:12,resize:"none"}} value={newPl.desc}
            onChange={e => setNewPl({ ...newPl, desc: e.target.value })}/>
          <label className="lbl">Google Maps Linki</label>
          <input placeholder="https://maps.app.goo.gl/…" style={{marginBottom:20}} value={newPl.url}
            onChange={e => setNewPl({ ...newPl, url: e.target.value })}/>
          <div style={{display:"flex",gap:10}}>
            <button className="btn-out" onClick={() => setShowAddPl(false)}>İptal</button>
            <button className="btn-pri tap" onClick={() => {
              if (!newPl.name.trim()) { toast("Mekan adı gerekli.", "⚠️"); return; }
              const id = "c" + newId();
              const maxO = customCityPl.length > 0 ? Math.max(...customCityPl.map(p => p.sortOrder || 0)) : -1;
              wr(`customPlaces/${id}`, { ...newPl, name: newPl.name.trim(), id, city, addedBy: myUid, sortOrder: maxO + 1, lat: activeCityObj?.lat || 51, lon: activeCityObj?.lon || 10 });
              setShowAddPl(false);
              setNewPl(initPl);
            }}>Kaydet</button>
          </div>
        </Modal>
      )}

      {showAddExp && (
        <Modal onClose={() => setShowAddExp(false)}>
          <ModalHead title="💸 Masraf Ekle" onClose={() => setShowAddExp(false)}/>
          <label className="lbl">Açıklama</label>
          <input placeholder="Taksi, Yemek…" value={newExp.desc} style={{marginBottom:12}}
            onChange={e => setNewExp({ ...newExp, desc: e.target.value })}/>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <div style={{flex:2}}>
              <label className="lbl">Tutar</label>
              <input type="number" step="0.01" value={newExp.amount} placeholder="0.00"
                onChange={e => setNewExp({ ...newExp, amount: e.target.value })}/>
            </div>
            <div>
              <label className="lbl">Birim</label>
              <select value={newExp.currency} onChange={e => setNewExp({ ...newExp, currency: e.target.value })} style={{width:"auto"}}>
                <option value="EUR">€</option><option value="TRY">₺</option><option value="USD">$</option>
              </select>
            </div>
          </div>
          <label className="lbl">Kategori</label>
          <select value={newExp.category} style={{marginBottom:12}} onChange={e => setNewExp({ ...newExp, category: e.target.value })}>
            {EXP_CATS.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}
          </select>
          <label className="lbl">Şehir</label>
          <select value={newExp.city} style={{marginBottom:12}} onChange={e => setNewExp({ ...newExp, city: e.target.value })}>
            <option value="global">🌍 Genel</option>
            {allCities.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}
          </select>
          <label className="lbl">Fiş / Fatura (isteğe bağlı)</label>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            {newExp.receipt
              ? <div style={{position:"relative"}}>
                  <img src={newExp.receipt} alt="" style={{width:64,height:64,borderRadius:12,objectFit:"cover",border:"1.5px solid var(--border)"}}/>
                  <div className="tap" onClick={() => setNewExp({ ...newExp, receipt: null })}
                    style={{position:"absolute",top:-5,right:-5,width:18,height:18,borderRadius:"50%",background:"var(--red)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>✕</div>
                </div>
              : <div className="photo-add tap" onClick={() => receiptInputRef.current?.click()}>🧾</div>}
            <input type="file" accept="image/*" capture="environment" style={{display:"none"}} ref={receiptInputRef}
              onChange={async e => {
                const f = e.target.files[0];
                if (!f) return;
                const data = await compressImg(f);
                setNewExp(p => ({ ...p, receipt: data }));
              }}/>
          </div>
          <label className="lbl">Kim Ödedi?</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {memberList.map(mb => (
              <div key={mb.uid} className="tap" onClick={() => setNewExp({ ...newExp, paidBy: mb.uid })}
                style={{padding:"9px 14px",borderRadius:12,fontSize:13,fontWeight:700,
                  background:newExp.paidBy === mb.uid ? "var(--pri)" : "var(--bg)",
                  color:newExp.paidBy === mb.uid ? "#fff" : "var(--text)"}}>{mb.name}</div>
            ))}
          </div>
          <label className="lbl">Kimler Paylaşıyor?</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}}>
            {memberList.map(mb => {
              const on = newExp.splitAmong.includes(mb.uid);
              return (
                <div key={mb.uid} className="tap"
                  onClick={() => setNewExp({ ...newExp, splitAmong: on ? newExp.splitAmong.filter(x => x !== mb.uid) : [...newExp.splitAmong, mb.uid] })}
                  style={{padding:"9px 14px",borderRadius:12,fontSize:13,fontWeight:700,
                    background:on ? "var(--green)" : "transparent",color:on ? "#fff" : "var(--muted)",
                    border:`1.5px solid ${on ? "var(--green)" : "var(--border)"}`}}>
                  {on ? "✓ " : ""}{mb.name}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn-out" onClick={() => setShowAddExp(false)}>İptal</button>
            <button className="btn-pri tap" onClick={() => {
              if (!newExp.amount) { toast("Tutar girilmedi.", "⚠️"); return; }
              if (!newExp.splitAmong.length) { toast("En az bir kişi paylaşmalı.", "⚠️"); return; }
              const id = newId();
              wr(`expenses/${id}`, { ...newExp, id, ts: Date.now(), paidBy: newExp.paidBy || myUid, amount: parseFloat(newExp.amount) || 0 });
              setShowAddExp(false);
              setNewExp(initExp);
            }}>Ekle</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
