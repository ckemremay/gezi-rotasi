:root{--pri:#1C3A2A;--acc:#B8682A;--bg:#F9F7F2;--card:#fff;
      --text:#2A211A;--muted:#7A6F66;--border:#E8E2D9;
      --green:#438A64;--red:#D14D3F;
      --sh:0 4px 12px rgba(42,33,26,.06);--sh-lg:0 8px 24px rgba(42,33,26,.1);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:'Figtree',sans-serif;color:var(--text);
          overscroll-behavior:none;line-height:1.5;-webkit-font-smoothing:antialiased;}
input,select,textarea{font-family:'Figtree',sans-serif;outline:none;
  border:1.5px solid var(--border);transition:border-color .2s;
  background:#fff;border-radius:12px;padding:12px 14px;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--pri);}
::-webkit-scrollbar{display:none;}
.tap{cursor:pointer;user-select:none;transition:transform .1s,opacity .15s;}
.tap:active{transform:scale(.97);opacity:.8;}
.overlay{position:fixed;inset:0;background:rgba(28,58,42,.45);
  backdrop-filter:blur(4px);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:24px;padding:28px;width:100%;
  max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);}
.btn-pri{background:var(--pri);color:#fff;border:none;padding:14px;
  border-radius:14px;font-weight:700;font-size:15px;width:100%;
  font-family:'Figtree',sans-serif;cursor:pointer;}
.btn-out{background:#fff;border:1.5px solid var(--border);padding:12px;
  border-radius:14px;font-weight:600;font-size:14px;width:100%;
  color:var(--pri);font-family:'Figtree',sans-serif;cursor:pointer;}
.lbl{font-size:11px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
.header{background:linear-gradient(135deg,#1C3A2A 0%,#2D5A42 100%);color:#fff;
  padding:calc(40px + env(safe-area-inset-top)) 24px 22px;
  border-bottom-left-radius:28px;border-bottom-right-radius:28px;
  box-shadow:0 10px 30px rgba(28,58,42,.15);}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);
  overflow-x:auto;padding:0 8px;position:sticky;top:0;z-index:100;white-space:nowrap;}
.ctab{padding:14px 18px;border-bottom:3px solid transparent;font-size:13px;
  font-weight:600;color:var(--muted);transition:all .25s;cursor:pointer;
  display:flex;align-items:center;gap:6px;}
.ctab.on{border-bottom-color:var(--pri);font-weight:800;color:var(--pri);}
.place-card{background:#fff;border-radius:20px;padding:18px 18px 14px;
  margin-bottom:14px;box-shadow:var(--sh);border:1.5px solid var(--border);}
.place-card.vis{background:#f1f3f1;border-color:#d8e0d8;opacity:.82;}
.wx-day{flex:1;text-align:center;padding:7px 3px;border-radius:12px;
  background:rgba(28,58,42,.025);border:1px solid rgba(28,58,42,.04);}
.map-wrap{width:100%;height:280px;border-radius:22px;overflow:hidden;
  border:1.5px solid var(--border);box-shadow:var(--sh);}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);
  backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;
  padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:1000;}
.nav-item{flex:1;text-align:center;color:var(--muted);font-size:9px;
  font-weight:700;transition:color .2s;letter-spacing:.3px;}
.nav-item.on{color:var(--pri);}
.chip{padding:8px 14px;border-radius:50px;border:1.5px solid var(--border);
  font-size:12px;font-weight:600;background:#fff;cursor:pointer;
  white-space:nowrap;font-family:'Figtree',sans-serif;transition:all .2s;}
.chip.on{background:var(--pri);color:#fff;border-color:var(--pri);}
/* Toast */
.toast-wrap{position:fixed;top:calc(env(safe-area-inset-top)+12px);
  left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;flex-direction:column;gap:8px;
  width:calc(100% - 32px);max-width:440px;pointer-events:none;}
.toast{background:#1C3A2A;color:#fff;padding:12px 16px;border-radius:16px;
  font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);
  display:flex;align-items:center;gap:10px;
  animation:tIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes tIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* Offline */
.off-banner{background:var(--red);color:#fff;text-align:center;
  padding:8px 16px;font-size:12px;font-weight:800;
  position:sticky;top:0;z-index:500;display:flex;align-items:center;justify-content:center;gap:8px;}
/* Photos */
.photo-grid{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.photo-thumb{width:68px;height:68px;border-radius:12px;object-fit:cover;
  border:2px solid var(--border);cursor:pointer;}
.photo-add{width:68px;height:68px;border-radius:12px;border:2px dashed var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;background:var(--bg);}
.photo-full{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:3000;
  display:flex;align-items:center;justify-content:center;padding:20px;}
/* Poll */
.poll-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;
  box-shadow:var(--sh);border:1.5px solid var(--border);}
.poll-opt{padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);
  margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.poll-opt.voted{border-color:var(--pri);background:rgba(28,58,42,.04);}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(28,58,42,.06);
  transition:width .5s ease;border-radius:10px;}
/* Currency converter */
.conv-card{background:linear-gradient(135deg,#1C3A2A,#2D5A42);
  border-radius:20px;padding:20px;margin-bottom:16px;color:#fff;}
.conv-row{display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.conv-row:last-child{border-bottom:none;}
/* Route */
.route-badge{width:26px;height:26px;border-radius:50%;background:var(--acc);
  color:#fff;font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.route-info{background:#1C3A2A;color:#fff;padding:12px 16px;border-radius:14px;
  margin-top:12px;display:flex;align-items:center;justify-content:space-between;}
/* Stat */
.chart-wrap{background:#fff;border-radius:20px;padding:20px;
  border:1.5px solid var(--border);box-shadow:var(--sh);margin-bottom:16px;}
.stat-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid #F5F0E8;}
.stat-row:last-child{border-bottom:none;}
.del-btn{width:22px;height:22px;border-radius:50%;background:rgba(209,77,63,.1);
  color:var(--red);display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
